name: Build and test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Test
        env:
          VIRTUALSMS_API_KEY: ${{ secrets.VIRTUALSMS_API_KEY }}
        run: bundle exec rake test || ruby -Ilib -Itest test/*_test.rb
